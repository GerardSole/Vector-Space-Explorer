<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vector Space Explorer</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>
</head>
<body>
<div id="app">

  <!-- ===================== LEFT PANEL: VECTOR DB ===================== -->
  <!-- contenido generado íntegramente por ui.js (header/INSERT/SEARCH/DELETE/log) -->
  <aside class="db-panel" id="dbPanel"></aside>

  <!-- ===================== RIGHT PANEL: THREE.JS SCENE ===================== -->
  <main class="viewport" id="viewport">
    <canvas id="scene-canvas"></canvas>
    <div class="viewport__hint">Arrastra para rotar · scroll para zoom · click en un punto para inspeccionarlo</div>
  </main>

</div>

<script type="module" src="js/scene.js"></script>
<script type="module" src="js/ui.js"></script>
</body>
</html>
