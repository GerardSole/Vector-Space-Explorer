services:
  - type: web
    name: vector-space-explorer-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: COHERE_API_KEY
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: QDRANT_COLLECTION
        value: vectors
